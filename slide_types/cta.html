<div class="slide slide-cta" id="slide-cta">
  {{decoration_html}}
  <div class="brand-zone"></div>
  <div class="progress-bar"><div class="fill fill-full"></div></div>

  <div class="cta-content">
    <div class="cta-icon">{{cta_icon}}</div>
    <h2 class="cta-heading">{{heading}}</h2>
    <div class="cta-divider"></div>
    <p class="cta-body">{{body}}</p>
    <div class="cta-button">{{button_text}}</div>
  </div>

</div>
