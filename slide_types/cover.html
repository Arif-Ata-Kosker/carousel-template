<div class="slide slide-cover" id="slide-cover">
  {{decoration_html}}
  <div class="brand-zone"></div>
  <div class="top-line">
    <span class="category-tag">{{category}}</span>
  </div>

  <span class="cover-eyebrow">{{cover_eyebrow}}</span>
  <h1 class="cover-title">{{cover_title}}</h1>
  <div class="cover-divider"></div>
  <p class="cover-subtitle">{{cover_subtitle}}</p>

  {{terminal_block}}

  <div class="swipe-hint">
    <span>{{swipe_text}}</span>
    <span class="arrow">{{swipe_arrow}}</span>
  </div>
</div>
