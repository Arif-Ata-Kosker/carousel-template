<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary:    #12082A;
  --bg-secondary:  #0F1A3D;
  --bg-card:       rgba(255,255,255,0.07);
  --bg-terminal:   rgba(0,0,0,0.5);
  --text-primary:  #FAFAFA;
  --text-muted:    #CBD5E1;
  --text-dim:      #7C8FA6;
  --accent:        #A855F7;
  --accent-light:  #C084FC;
  --accent2:       #06B6D4;
  --accent2-light: #22D3EE;
  --accent-dim:    rgba(168,85,247,0.15);
  --green:         #4ADE80;
  --red:           #F87171;
  --yellow:        #FCD34D;
  --divider:       rgba(255,255,255,0.1);
  --font-heading:  'Space Grotesk', 'Inter', sans-serif;
  --font-body:     'Inter', sans-serif;
  --font-mono:     'JetBrains Mono', monospace;
  --pad-x: 36px;
  --pad-y: 40px;
}

body {
  background: #080514;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  padding: 32px;
  font-family: var(--font-body);
}

/* ─── SLIDE BASE ─── */
.slide {
  width: 420px;
  height: 525px;
  background: linear-gradient(135deg, #1a0533 0%, #0f1a3d 55%, #071a2e 100%);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* animated mesh gradient overlay */
.slide::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 10% 20%, rgba(168,85,247,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(6,182,212,0.15) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* top border glow */
.slide::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  pointer-events: none;
  z-index: 0;
}

.slide > * { position: relative; z-index: 1; }


/* ─── PROGRESS BAR ─── */
.progress-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: rgba(255,255,255,0.1);
  z-index: 5;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

/* ─── SLIDE NUMBER ─── */
.slide-number {
  position: absolute;
  top: 16px; right: var(--pad-x);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  z-index: 5;
}

/* ─── HANDLE ─── */
.handle {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--accent-light);
}


/* ═══════════════════════════════════════
   COVER
   ═══════════════════════════════════════ */
.slide-cover {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;
  padding: var(--pad-y) var(--pad-x) 28px;
}

.slide-cover .top-line {
  position: absolute;
  top: var(--pad-y);
  left: var(--pad-x);
  right: var(--pad-x);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 5;
}

.slide-cover .category-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-light);
  background: rgba(168,85,247,0.15);
  border: 1px solid rgba(168,85,247,0.35);
  padding: 3px 8px;
  border-radius: 12px;
}

.slide-cover .cover-eyebrow {
  margin-top: 52px;
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 10px;
}

.slide-cover .cover-title {
  font-family: var(--font-heading);
  font-size: 42px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  margin-bottom: 12px;
}

.slide-cover .cover-title em {
  font-style: normal;
  background: linear-gradient(90deg, var(--accent-light), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.slide-cover .cover-divider {
  width: 32px;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  margin-bottom: 12px;
  flex-shrink: 0;
}

.slide-cover .cover-subtitle {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--text-muted);
  max-width: 310px;
  margin-bottom: 16px;
}

.slide-cover .swipe-hint {
  position: absolute;
  bottom: 20px;
  right: var(--pad-x);
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
}
.slide-cover .swipe-hint .arrow {
  color: var(--accent2);
}


/* ═══════════════════════════════════════
   INNER SLIDES
   ═══════════════════════════════════════ */
.slide-inner {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  height: 100%;
  padding: 60px var(--pad-x) var(--pad-y);
}

.slide-inner .slide-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 10px;
}

.slide-inner .slide-heading {
  font-family: var(--font-heading);
  font-size: 34px;
  font-weight: 700;
  line-height: 1.12;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  margin-bottom: 12px;
}

.slide-inner .slide-heading em {
  font-style: normal;
  background: linear-gradient(90deg, var(--accent-light), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.slide-inner .divider-short {
  width: 24px;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  margin-bottom: 14px;
  flex-shrink: 0;
}

.slide-inner .slide-body {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text-muted);
}

.slide-inner .slide-body strong {
  color: var(--accent-light);
  font-weight: 600;
}


/* ─── TERMINAL BLOCK ─── */
.terminal-block {
  background: var(--bg-terminal);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  overflow: hidden;
  margin-top: auto;
  flex-shrink: 0;
  backdrop-filter: blur(8px);
}

.terminal-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.terminal-header .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.terminal-header .dot.red    { background: #F85149; }
.terminal-header .dot.yellow { background: #D29922; }
.terminal-header .dot.green  { background: #3FB950; }

.terminal-title {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  margin-left: 4px;
  letter-spacing: 0.04em;
}

.terminal-body {
  padding: 10px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.terminal-line {
  font-family: var(--font-mono);
  font-size: 10.5px;
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.terminal-line.cmd     { color: var(--text-primary); }
.terminal-line.output  { color: var(--text-muted); }
.terminal-line.success { color: var(--green); }
.terminal-line.error   { color: var(--red); }
.terminal-line.warning { color: var(--yellow); }


/* ─── inner_list ─── */
.numbered-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 2px;
}
.numbered-list li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.numbered-list li .num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent2);
  line-height: 1.4;
  flex-shrink: 0;
  min-width: 20px;
}
.numbered-list li .text {
  font-family: var(--font-body);
  font-size: 12px;
  line-height: 1.55;
  color: var(--text-muted);
}
.numbered-list li .text strong {
  color: var(--text-primary);
  font-weight: 600;
  display: block;
  margin-bottom: 1px;
  font-size: 12.5px;
}


/* ─── inner_quote ─── */
.quote-block {
  border-left: 2px solid var(--accent);
  padding: 10px 16px;
  background: var(--bg-card);
  margin: 8px 0;
  border-radius: 0 6px 6px 0;
}
.quote-block .quote-text {
  font-family: var(--font-heading);
  font-size: 17px;
  line-height: 1.5;
  color: var(--text-primary);
}
.quote-block .quote-attr {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--accent2);
  margin-top: 6px;
  letter-spacing: 0.06em;
}


/* ─── inner_stats ─── */
.stats-grid {
  display: flex;
  gap: 10px;
  margin: 10px 0 14px;
}
.stat-item {
  flex: 1;
  background: var(--bg-card);
  border-top: 2px solid var(--accent);
  border-radius: 8px;
  padding: 14px 10px 12px;
  text-align: center;
  backdrop-filter: blur(4px);
}
.stat-number {
  display: block;
  font-family: var(--font-heading);
  font-size: 36px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--accent-light), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-label {
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}


/* ─── inner_comparison ─── */
.comparison-grid {
  display: flex;
  margin-top: 10px;
  flex: 1;
  min-height: 0;
  gap: 1px;
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  overflow: hidden;
}
.comp-col {
  flex: 1;
  padding: 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.comp-col-left  { background: rgba(248,113,113,0.07); }
.comp-col-right { background: rgba(74,222,128,0.07); }
.comp-col-header {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.comp-col-left  .comp-col-header { color: var(--red); }
.comp-col-right .comp-col-header { color: var(--green); }
.comp-items {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.comp-items li {
  font-family: var(--font-body);
  font-size: 10.5px;
  line-height: 1.45;
  color: var(--text-muted);
  padding-left: 14px;
  position: relative;
}
.comp-col-left  .comp-items li::before { content: '×'; position: absolute; left: 0; color: var(--red);   font-weight: 700; font-size: 11px; }
.comp-col-right .comp-items li::before { content: '✓'; position: absolute; left: 0; color: var(--green); font-weight: 700; font-size: 11px; }


/* ═══════════════════════════════════════
   CTA
   ═══════════════════════════════════════ */
.slide-cta {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: var(--pad-y) var(--pad-x);
}

.slide-cta .cta-icon {
  font-size: 26px;
  margin-bottom: 14px;
  opacity: 0.9;
}

.slide-cta .cta-heading {
  font-family: var(--font-heading);
  font-size: 32px;
  font-weight: 700;
  line-height: 1.12;
  color: var(--text-primary);
  margin-bottom: 12px;
}

.slide-cta .cta-heading em {
  font-style: normal;
  background: linear-gradient(90deg, var(--accent-light), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.slide-cta .cta-divider {
  width: 32px;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  margin: 0 auto 14px;
}

.slide-cta .cta-body {
  font-family: var(--font-body);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-muted);
  max-width: 280px;
  margin-bottom: 22px;
}

.slide-cta .cta-button {
  border: 1px solid var(--accent);
  color: var(--accent-light);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 10px 28px;
  border-radius: 20px;
  margin-bottom: 20px;
  background: rgba(168,85,247,0.12);
}

.slide-cta .handle {
  position: absolute;
  bottom: var(--pad-y);
  right: var(--pad-x);
}
</style>
</head>
<body>

{{slides}}

</body>
</html>
