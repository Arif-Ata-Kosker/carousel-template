<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary:    #F5F0E8;
  --bg-secondary:  #EDE8DF;
  --bg-card:       #E8E2D8;
  --bg-terminal:   #1A1A1A;
  --text-primary:  #1A1A1A;
  --text-muted:    #5C5550;
  --text-dim:      #9E9690;
  --accent:        #C44B1B;
  --accent-light:  #D9622E;
  --accent-dim:    rgba(196,75,27,0.10);
  --green:         #2D7A3A;
  --red:           #C0392B;
  --yellow:        #B8860B;
  --divider:       #D8D2C8;
  --font-heading:  'Oswald', 'Barlow Condensed', sans-serif;
  --font-body:     'Inter', 'Montserrat', sans-serif;
  --font-mono:     'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  --pad-x: 36px;
  --pad-y: 40px;
}

body {
  background: #DDD8CF;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  padding: 32px;
  font-family: var(--font-body);
}

/* ─── SLIDE BASE ─── */
.slide {
  width: 420px;
  height: 525px;
  background: var(--bg-primary);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

/* subtle paper texture via diagonal lines */
.slide::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(196,75,27,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(196,75,27,0.03) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

/* corner accent block */
.slide::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 4px;
  background: var(--accent);
  pointer-events: none;
  z-index: 0;
}

.slide > * { position: relative; z-index: 1; }


/* ─── PROGRESS BAR ─── */
.progress-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--divider);
  z-index: 5;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-light));
}

/* ─── SLIDE NUMBER ─── */
.slide-number {
  position: absolute;
  top: 16px; right: var(--pad-x);
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.08em;
  color: var(--text-dim);
  z-index: 5;
}

/* ─── HANDLE ─── */
.handle {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--accent);
}


/* ═══════════════════════════════════════
   COVER
   ═══════════════════════════════════════ */
.slide-cover {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: flex-start;
  padding: var(--pad-y) var(--pad-x) 28px;
}

.slide-cover .top-line {
  position: absolute;
  top: var(--pad-y);
  left: var(--pad-x);
  right: var(--pad-x);
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 5;
}

.slide-cover .category-tag {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  background: var(--accent-dim);
  border: 1px solid rgba(196,75,27,0.25);
  padding: 3px 8px;
  border-radius: 3px;
}

.slide-cover .cover-eyebrow {
  margin-top: 52px;
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
}

.slide-cover .cover-title {
  font-family: var(--font-heading);
  font-size: 44px;
  font-weight: 700;
  line-height: 1.08;
  color: var(--text-primary);
  text-transform: uppercase;
  letter-spacing: 0.01em;
  margin-bottom: 12px;
}

.slide-cover .cover-title em {
  font-style: normal;
  color: var(--accent);
}

.slide-cover .cover-divider {
  width: 32px;
  height: 3px;
  background: var(--accent);
  margin-bottom: 12px;
  flex-shrink: 0;
}

.slide-cover .cover-subtitle {
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 400;
  line-height: 1.6;
  color: var(--text-muted);
  max-width: 310px;
  margin-bottom: 16px;
}

.slide-cover .swipe-hint {
  position: absolute;
  bottom: 20px;
  right: var(--pad-x);
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
}
.slide-cover .swipe-hint .arrow {
  color: var(--accent);
}


/* ═══════════════════════════════════════
   INNER SLIDES
   ═══════════════════════════════════════ */
.slide-inner {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  height: 100%;
  padding: 60px var(--pad-x) var(--pad-y);
}

.slide-inner .slide-label {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
}

.slide-inner .slide-heading {
  font-family: var(--font-heading);
  font-size: 36px;
  font-weight: 700;
  line-height: 1.1;
  color: var(--text-primary);
  text-transform: uppercase;
  letter-spacing: 0.01em;
  margin-bottom: 12px;
}

.slide-inner .slide-heading em {
  font-style: normal;
  color: var(--accent);
}

.slide-inner .divider-short {
  width: 24px;
  height: 3px;
  background: var(--accent);
  margin-bottom: 14px;
  flex-shrink: 0;
}

.slide-inner .slide-body {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 400;
  line-height: 1.7;
  color: var(--text-muted);
}

.slide-inner .slide-body strong {
  color: var(--accent);
  font-weight: 600;
}


/* ─── TERMINAL BLOCK ─── */
.terminal-block {
  background: var(--bg-terminal);
  border: 1px solid #333;
  border-radius: 6px;
  overflow: hidden;
  margin-top: auto;
  flex-shrink: 0;
}

.terminal-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  background: #111;
  border-bottom: 1px solid #333;
}

.terminal-header .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.terminal-header .dot.red    { background: #F85149; }
.terminal-header .dot.yellow { background: #D29922; }
.terminal-header .dot.green  { background: #3FB950; }

.terminal-title {
  font-family: var(--font-mono);
  font-size: 9px;
  color: #888;
  margin-left: 4px;
  letter-spacing: 0.04em;
}

.terminal-body {
  padding: 10px 14px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.terminal-line {
  font-family: var(--font-mono);
  font-size: 10.5px;
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.terminal-line.cmd     { color: #E6EDF3; }
.terminal-line.output  { color: #8B949E; }
.terminal-line.success { color: #3FB950; }
.terminal-line.error   { color: #F85149; }
.terminal-line.warning { color: #D29922; }


/* ─── inner_list ─── */
.numbered-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 2px;
}
.numbered-list li {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.numbered-list li .num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--accent);
  line-height: 1.4;
  flex-shrink: 0;
  min-width: 20px;
}
.numbered-list li .text {
  font-family: var(--font-body);
  font-size: 12px;
  line-height: 1.55;
  color: var(--text-muted);
}
.numbered-list li .text strong {
  color: var(--text-primary);
  font-weight: 600;
  display: block;
  margin-bottom: 1px;
  font-size: 12.5px;
}


/* ─── inner_quote ─── */
.quote-block {
  border-left: 3px solid var(--accent);
  padding: 10px 16px;
  background: var(--bg-card);
  margin: 8px 0;
}
.quote-block .quote-text {
  font-family: var(--font-heading);
  font-size: 17px;
  line-height: 1.5;
  color: var(--text-primary);
}
.quote-block .quote-attr {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--accent);
  margin-top: 6px;
  letter-spacing: 0.06em;
}


/* ─── inner_stats ─── */
.stats-grid {
  display: flex;
  gap: 10px;
  margin: 10px 0 14px;
}
.stat-item {
  flex: 1;
  background: var(--bg-card);
  border-top: 3px solid var(--accent);
  border-radius: 0 0 4px 4px;
  padding: 14px 10px 12px;
  text-align: center;
}
.stat-number {
  display: block;
  font-family: var(--font-heading);
  font-size: 36px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 6px;
}
.stat-label {
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
}


/* ─── inner_comparison ─── */
.comparison-grid {
  display: flex;
  margin-top: 10px;
  flex: 1;
  min-height: 0;
  gap: 1px;
  background: var(--divider);
  border-radius: 4px;
  overflow: hidden;
}
.comp-col {
  flex: 1;
  padding: 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.comp-col-left  { background: rgba(192,57,43,0.06); }
.comp-col-right { background: rgba(45,122,58,0.06); }
.comp-col-header {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--divider);
}
.comp-col-left  .comp-col-header { color: var(--red); }
.comp-col-right .comp-col-header { color: var(--green); }
.comp-items {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.comp-items li {
  font-family: var(--font-body);
  font-size: 10.5px;
  line-height: 1.45;
  color: var(--text-muted);
  padding-left: 14px;
  position: relative;
}
.comp-col-left  .comp-items li::before { content: '×'; position: absolute; left: 0; color: var(--red);   font-weight: 700; font-size: 11px; }
.comp-col-right .comp-items li::before { content: '✓'; position: absolute; left: 0; color: var(--green); font-weight: 700; font-size: 11px; }


/* ═══════════════════════════════════════
   CTA
   ═══════════════════════════════════════ */
.slide-cta {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: var(--pad-y) var(--pad-x);
}

.slide-cta .cta-icon {
  font-size: 26px;
  margin-bottom: 14px;
  opacity: 0.9;
}

.slide-cta .cta-heading {
  font-family: var(--font-heading);
  font-size: 32px;
  font-weight: 700;
  line-height: 1.12;
  color: var(--text-primary);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.slide-cta .cta-heading em {
  font-style: normal;
  color: var(--accent);
}

.slide-cta .cta-divider {
  width: 32px;
  height: 3px;
  background: var(--accent);
  margin: 0 auto 14px;
}

.slide-cta .cta-body {
  font-family: var(--font-body);
  font-size: 12px;
  line-height: 1.6;
  color: var(--text-muted);
  max-width: 280px;
  margin-bottom: 22px;
}

.slide-cta .cta-button {
  border: 2px solid var(--accent);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 10px 28px;
  border-radius: 4px;
  margin-bottom: 20px;
  background: var(--accent-dim);
}

.slide-cta .handle {
  position: absolute;
  bottom: var(--pad-y);
  right: var(--pad-x);
}
</style>
</head>
<body>

{{slides}}

</body>
</html>
